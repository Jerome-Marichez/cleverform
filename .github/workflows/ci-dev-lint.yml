name: CI dev — Lint & types

# Check rapide à chaque PR vers `dev` : lint (ESLint) + vérification des types (tsc).
# Commandes passées via Make (interface unique du projet — voir docs/tooling.md).
on:
  pull_request:
    branches: [dev]

jobs:
  lint:
    name: Lint & types
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: make ci-install
      - run: make prisma-generate
      - run: make lint
      - run: make typecheck
