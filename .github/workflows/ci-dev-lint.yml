name: CI dev — Lint & types

# Check rapide à chaque PR vers `dev` : lint (ESLint) + vérification des types (tsc).
on:
  pull_request:
    branches: [dev]

jobs:
  lint:
    name: Lint & types
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx prisma generate
      - run: npm run lint
      - run: npm run typecheck
