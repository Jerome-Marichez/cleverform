name: CI main — Tests système (back)

# Check de mise en production (PR `dev` -> `main`) : tests système back (Cypress).
# Commandes passées via Make : `make test-system` lance le serveur (build préalable)
# et l'orchestre via start-server-and-test (voir docs/tooling.md).
on:
  pull_request:
    branches: [main]

jobs:
  systeme:
    name: Tests système (back)
    runs-on: ubuntu-latest
    # Le serveur tourne contre une BDD de test DÉDIÉE (service Postgres ci-dessous) —
    # jamais la base Neon de production. Mot de passe / secret de test déterministes
    # (throwaway) pour que Cypress puisse s'authentifier.
    env:
      DATABASE_URL: postgresql://test:test@localhost:5432/cleverform_test
      DIRECT_URL: postgresql://test:test@localhost:5432/cleverform_test
      TEST_DATABASE_URL: postgresql://test:test@localhost:5432/cleverform_test
      ADMIN_PASSWORD: test-admin-password
      SESSION_SECRET: ci-system-test-session-secret
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      CYPRESS_ADMIN_PASSWORD: test-admin-password
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: cleverform_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U test -d cleverform_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: make ci-install
      - run: make prisma-generate
      - name: Prépare la BDD de test
        run: make test-db-prepare TEST_DB_URL="$TEST_DATABASE_URL"
      - run: make build
      - run: make test-system
