name: CI main — Tests système (back)

# Check de mise en production (PR `dev` -> `main`) : tests système back (Cypress).
# Commandes passées via Make : `make test-system` lance le serveur de prod (build
# préalable) et l'orchestre via start-server-and-test (voir docs/tooling.md).
on:
  pull_request:
    branches: [main]

jobs:
  systeme:
    name: Tests système (back)
    runs-on: ubuntu-latest
    # Secrets injectés depuis GitHub Actions (jamais codés en dur). Absents = chaînes
    # vides : sans impact (Prisma initialisé paresseusement).
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      DIRECT_URL: ${{ secrets.DATABASE_URL_UNPOOLED }}
      ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
      SESSION_SECRET: ${{ secrets.SESSION_SECRET }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: make ci-install
      - run: make prisma-generate
      - run: make build
      - run: make test-system
