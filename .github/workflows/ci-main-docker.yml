name: CI main — Docker (build, run & disponibilité)

# Check de mise en production (PR `dev` -> `main`) : vérifie que l'app
# démarre hors écosystème Vercel (anti vendor lock-in). Construit l'image
# (build standalone via DOCKER_BUILD=1 dans le Dockerfile) via `make docker-build`,
# lance le conteneur et vérifie sa disponibilité (curl sur `/`). Voir docs/docker.md.
on:
  pull_request:
    branches: [main]

jobs:
  docker:
    name: Docker — build, run & disponibilité
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build de l'image
        run: make docker-build
      - name: Run + healthcheck
        run: |
          docker run -d --name cc -p 3000:3000 \
            -e DATABASE_URL=postgresql://u:p@localhost:5432/db \
            -e DIRECT_URL=postgresql://u:p@localhost:5432/db \
            cleverconnect
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:3000 >/dev/null; then echo "✅ App disponible"; exit 0; fi
            sleep 2
          done
          echo "❌ App indisponible"; docker logs cc; exit 1
