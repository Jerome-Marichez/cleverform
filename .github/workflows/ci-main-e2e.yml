name: CI main — Tests e2e (front)

# Check de mise en production (PR `dev` -> `main`) : tests end-to-end front (Cypress).
# Commandes passées via Make : `make test-e2e` construit le serveur (build préalable)
# et l'orchestre via start-server-and-test (voir docs/tooling.md).
on:
  pull_request:
    branches: [main]

jobs:
  e2e:
    name: Tests e2e (front)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: make ci-install
      - run: make prisma-generate
      - run: make build
      - run: make test-e2e
