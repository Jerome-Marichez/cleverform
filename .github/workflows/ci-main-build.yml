name: CI main — Build local

# Check de mise en production (PR `dev` -> `main`) : build local Next.js.
# Commandes passées via Make (interface unique du projet — voir docs/tooling.md).
on:
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build local (next build)
    runs-on: ubuntu-latest
    # Secrets injectés depuis GitHub Actions (jamais codés en dur). Absents = chaînes
    # vides : le build fonctionne sans DB (Prisma initialisé paresseusement).
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      DIRECT_URL: ${{ secrets.DATABASE_URL_UNPOOLED }}
      ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
      SESSION_SECRET: ${{ secrets.SESSION_SECRET }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: make ci-install
      - run: make prisma-generate
      - run: make build
