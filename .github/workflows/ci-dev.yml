name: CI (dev)

# Checks rapides à chaque PR vers `dev`.
on:
  pull_request:
    branches: [dev]

jobs:
  quality:
    name: Lint & types
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx prisma generate
      - run: npm run lint
      - run: npm run typecheck

  tests:
    name: Tests unitaires & intégration
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: cypress-io/github-action@v6
        with:
          install-command: npm ci
          command: npm run prisma:generate && npm run test:unit && npm run test:integration
