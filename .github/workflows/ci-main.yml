name: CI (main)

# Checks longs réservés à la mise en production (PR `dev` -> `main`).
on:
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build local (next build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx prisma generate
      - run: npm run build

  docker:
    name: Docker — build, run & disponibilité
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build de l'image
        run: docker build -t cleverconnect .
      - name: Run + healthcheck
        run: |
          docker run -d --name cc -p 3000:3000 \
            -e DATABASE_URL=postgresql://u:p@localhost:5432/db \
            -e DIRECT_URL=postgresql://u:p@localhost:5432/db \
            cleverconnect
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:3000 >/dev/null; then echo "✅ App disponible"; exit 0; fi
            sleep 2
          done
          echo "❌ App indisponible"; docker logs cc; exit 1

  e2e:
    name: Tests e2e (front)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: cypress-io/github-action@v6
        with:
          build: npx prisma generate && npm run build
          start: npm run start
          wait-on: http://localhost:3000
          spec: tests/e2e/**/*.cy.ts

  systeme:
    name: Tests système (back)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: cypress-io/github-action@v6
        with:
          build: npx prisma generate && npm run build
          start: npm run start
          wait-on: http://localhost:3000
          spec: tests/systeme/**/*.cy.ts
