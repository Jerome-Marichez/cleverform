# Exécution locale "compatibilité" : app (image Docker) + PostgreSQL.
# Permet de vérifier que le frontend/backend tournent hors Vercel.
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: cleverconnect
      POSTGRES_PASSWORD: cleverconnect
      POSTGRES_DB: cleverconnect
    ports:
      - "5432:5432"
    volumes:
      - db-data:/var/lib/postgresql/data

  app:
    build: .
    environment:
      DATABASE_URL: postgresql://cleverconnect:cleverconnect@db:5432/cleverconnect?sslmode=disable
      DIRECT_URL: postgresql://cleverconnect:cleverconnect@db:5432/cleverconnect?sslmode=disable
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    ports:
      - "3000:3000"
    depends_on:
      - db

volumes:
  db-data:
